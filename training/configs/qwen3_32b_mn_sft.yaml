run_name: qwen3_32b_mn_sft_qlora
model:
  base_model: Qwen/Qwen3-32B
  model_family: Qwen
  trust_remote_code: true
  torch_dtype: bfloat16
  attn_implementation: flash_attention_2
quantization:
  load_in_4bit: true
  bnb_4bit_quant_type: nf4
  bnb_4bit_compute_dtype: bfloat16
  bnb_4bit_use_double_quant: true
lora:
  r: 16
  alpha: 32
  dropout: 0.05
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj
data:
  train_file: datasets/processed/sft_train.jsonl
  validation_file: datasets/processed/sft_val.jsonl
  max_seq_length: 4096
training:
  output_dir: outputs/qwen3_32b_mn_lendex_lora
  num_train_epochs: 1
  per_device_train_batch_size: 1
  per_device_eval_batch_size: 1
  gradient_accumulation_steps: 16
  learning_rate: 0.00002
  lr_scheduler_type: cosine
  warmup_ratio: 0.03
  logging_steps: 10
  save_steps: 100
  eval_steps: 100
  evaluation_strategy: steps
  save_total_limit: 2
  bf16: true
  fp16: false
  gradient_checkpointing: true
  optim: paged_adamw_8bit
  max_grad_norm: 0.3
  report_to: none
hardware:
  target_gpu: A100 80GB
  min_cuda_devices: 1
  require_cuda_for_real_training: true
safety:
  reject_contains_pii: true
  do_not_train_on_raw_customer_pii: true
  mock_safe_by_default: true
